<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Косатка: Бешеная кошка</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: manipulation;
            padding: 16px;
        }
        .game-container {
            background: linear-gradient(145deg, #0f0f1a, #080811);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.08);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 36px;
            cursor: pointer;
            touch-action: none;
            width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.94);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .menu-panel {
            background: linear-gradient(145deg, #1a1a2a, #0c0c18);
            border-radius: 72px;
            padding: 36px 44px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.2);
            max-width: 90%;
            width: 420px;
        }
        .menu-panel h1 {
            font-size: 3rem;
            margin: 0 0 5px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .menu-panel .sub {
            color: #aaa;
            margin-bottom: 32px;
            font-size: 0.85rem;
        }
        .menu-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 14px 28px;
            margin: 8px 0;
            width: 100%;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.25s;
        }
        .menu-btn.primary {
            background: linear-gradient(135deg, #ff8c00, #ff5500);
            box-shadow: 0 6px 20px rgba(255,85,0,0.35);
        }
        .menu-btn.secondary {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .difficulty-row {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .difficulty-btn {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 12px 8px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .difficulty-btn.active {
            background: linear-gradient(135deg, #ff8c00, #ff5500);
            border-color: transparent;
        }
        .back-btn {
            background: rgba(255,255,255,0.04);
            margin-top: 16px;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 60px;
            margin-bottom: 18px;
            backdrop-filter: blur(8px);
            gap: 8px;
            flex-wrap: wrap;
        }
        .info-box {
            background: rgba(0,0,0,0.7);
            padding: 6px 18px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .info-box span {
            color: #ffd700;
            margin-right: 6px;
        }
        .sound-toggle, .exit-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 50px;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }
        .exit-btn {
            background: rgba(100,50,50,0.5);
            border: 1px solid rgba(255,80,80,0.2);
        }
        .right-buttons {
            display: flex;
            gap: 8px;
        }
        .warning {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            animation: slideDown 0.3s ease;
            z-index: 150;
            pointer-events: none;
            white-space: nowrap;
            font-size: 0.9rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-25px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .level-complete {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            padding: 32px 48px;
            border-radius: 64px;
            text-align: center;
            z-index: 180;
            animation: popIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 2px solid #ffd700;
        }
        .level-complete h2 { margin: 0 0 20px; color: #ffd700; }
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @media (max-width: 550px) {
            .menu-panel { padding: 28px 24px; }
            .menu-panel h1 { font-size: 2.2rem; }
            .warning { top: 70px; font-size: 0.75rem; white-space: normal; max-width: 85%; }
            .info-box { padding: 4px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div id="menuOverlay" class="menu-overlay">
    <div class="menu-panel">
        <h1>🐱 КОСАТКА 🖤</h1>
        <div class="sub">БЕШЕНАЯ КОШКА | РИТМ-РЕАКЦИЯ</div>
        <button class="menu-btn primary" onclick="startLevelMode()">🐾 УРОВНИ (30 уровней)</button>
        <button class="menu-btn secondary" onclick="showDifficultyMenu()">🌀 БЕСКОНЕЧНЫЙ РЕЖИМ</button>
        <div style="margin-top: 20px;">
            <button class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔊 ЗВУК ВКЛ</button>
        </div>
    </div>
</div>

<div id="difficultyMenu" style="display:none;" class="menu-overlay">
    <div class="menu-panel">
        <h2>🎮 БЕСКОНЕЧНЫЙ РЕЖИМ</h2>
        <div class="difficulty-row">
            <div class="difficulty-btn" data-diff="easy" onclick="setDifficulty('easy')">🍃 ЛЁГКИЙ</div>
            <div class="difficulty-btn active" data-diff="normal" onclick="setDifficulty('normal')">⚡ СРЕДНИЙ</div>
            <div class="difficulty-btn" data-diff="hard" onclick="setDifficulty('hard')">🔥 СЛОЖНЫЙ</div>
        </div>
        <button class="menu-btn primary" onclick="startEndlessMode()">НАЧАТЬ ИГРУ</button>
        <button class="menu-btn back-btn" onclick="backToMain()">◀ ГЛАВНОЕ МЕНЮ</button>
    </div>
</div>

<div class="game-container" id="gameContainer" style="display:none;">
    <div class="info-panel">
        <div class="info-box"><span>🎯</span> <span id="scoreValue">0</span></div>
        <div class="info-box"><span>🔥</span> <span id="comboValue">0</span></div>
        <div class="info-box"><span>⏱️</span> <span id="timeValue">0</span></div>
        <div class="info-box" id="modeInfo"><span>📊</span> <span id="levelInfo">Уровень 1/30</span></div>
        <div class="right-buttons">
            <button class="exit-btn" onclick="exitToMenu()">🚪 ВЫХОД</button>
            <button class="sound-toggle" onclick="toggleSound()" id="soundBtnGame">🔊</button>
        </div>
    </div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let w = 500, h = 500;
    canvas.width = w; canvas.height = h;
    
    let catImage = new Image();
    let catImageLoaded = false;
    let catX = w/2, catY = h/2;
    catImage.onload = () => catImageLoaded = true;
    catImage.onerror = () => catImageLoaded = false;
    catImage.src = 'cat.png';
    
    // Звуки
    let soundEnabled = true;
    let audioCtx = null;
    function initAudio() {
        if(!audioCtx && soundEnabled) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playBeep(freq, duration, type='sine', vol=0.15) {
        if(!soundEnabled) return;
        try {
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; osc.type = type;
            gain.gain.value = vol;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    function playCorrect() { playBeep(880, 0.12, 'sine', 0.13); }
    function playWrong() { playBeep(340, 0.25, 'sawtooth', 0.18); }
    function playLevelUp() { playBeep(660,0.08); setTimeout(()=>playBeep(880,0.12),100); setTimeout(()=>playBeep(1040,0.18),250); }
    function playGameOver() { playBeep(260,0.5); setTimeout(()=>playBeep(180,0.8),350); }
    function toggleSound() {
        soundEnabled = !soundEnabled;
        document.querySelectorAll('.sound-toggle').forEach(btn => btn.innerHTML = soundEnabled ? '🔊' : '🔇');
        if(soundEnabled && audioCtx?.state === 'suspended') audioCtx.resume();
    }
    function exitToMenu() {
        if(timerInterval) clearInterval(timerInterval);
        gameRunning = false;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('menuOverlay').style.display = 'flex';
        document.getElementById('difficultyMenu').style.display = 'none';
    }
    
    // Партиклы
    let particles = [];
    class Particle {
        constructor(x,y,color) {
            this.x=x; this.y=y; this.vx=(Math.random()-0.5)*7; this.vy=(Math.random()-0.5)*7-3;
            this.life=0.9; this.color=color; this.size=5+Math.random()*5;
        }
        update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.25; this.life-=0.025; return this.life>0; }
        draw(ctx) { ctx.globalAlpha=this.life; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size/1.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
    }
    function addParticles(x,y,color,count=10) { for(let i=0;i<count;i++) particles.push(new Particle(x,y,color)); }
    
    // Игровое состояние
    let gameRunning = true;
    let gameMode = 'levels';
    let currentLevel = 1;
    let endlessDifficulty = 'normal';
    let score = 0, combo = 0, scoreMultiplier = 1;
    let timeLeft = 60, levelTimeLeft = 45;
    let glitchMode = false, chaosMode = false, invertedMode = false;
    const actions = ['МЯУ','ТИХО','БЕЙ','ПРЯТКИ'];
    const actionEmoji = ['😺','🤫','👊','📦'];
    let sectorAngles = [0,90,180,270];
    const centerX=w/2, centerY=h/2, radius=165;
    let currentCommand = null;
    let commandEndTime = 0;
    let flashAlpha = 0, screenShake = 0;
    let timerInterval = null;
    let catRunTime = 0;
    
    function updateCatRunning() {
        catRunTime += 0.035;
        let runRadius = 85 + Math.sin(catRunTime*1.5)*30;
        let angle = catRunTime * 2.5;
        catX = centerX + Math.cos(angle)*runRadius;
        catY = centerY + Math.sin(angle*1.3)*runRadius - 5;
        if(gameRunning && combo>=3 && Math.random()<0.12) addParticles(catX,catY,'#ffd700',2);
    }
    function updateMultiplier() {
        if(combo===0) scoreMultiplier=1;
        else if(combo===1) scoreMultiplier=1;
        else if(combo===2) scoreMultiplier=2;
        else if(combo===3) scoreMultiplier=3;
        else if(combo===4) scoreMultiplier=4;
        else scoreMultiplier=5;
    }
    function updateUI() {
        const scoreEl = document.getElementById('scoreValue');
        const comboEl = document.getElementById('comboValue');
        const timeEl = document.getElementById('timeValue');
        const levelSpan = document.getElementById('levelInfo');
        if(scoreEl) scoreEl.innerText = score;
        if(comboEl) comboEl.innerText = combo;
        if(timeEl) timeEl.innerText = Math.ceil(gameMode === 'levels' ? levelTimeLeft : timeLeft);
        if(levelSpan) {
            if(gameMode === 'levels') levelSpan.innerText = `Уровень ${currentLevel}/30`;
            else levelSpan.innerText = `Бесконечный [${endlessDifficulty === 'easy' ? 'Лёгкий' : endlessDifficulty === 'normal' ? 'Средний' : 'Сложный'}]`;
        }
    }
    function showWarning(msg) {
        const div = document.createElement('div');
        div.className = 'warning';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(()=>div.remove(),1100);
    }
    function getSectorFromClick(mx,my) {
        const dx=mx-centerX, dy=my-centerY;
        if(Math.hypot(dx,dy)>radius+20) return -1;
        let angle = Math.atan2(dy,dx)*180/Math.PI;
        if(angle<0) angle+=360;
        for(let i=0;i<4;i++) {
            let start=sectorAngles[i]-45, end=sectorAngles[i]+45;
            if(start<0) start+=360; if(end>=360) end-=360;
            if(start<=end) { if(angle>=start && angle<=end) return i; }
            else { if(angle>=start || angle<=end) return i; }
        }
        return -1;
    }
    function getActionForSector(idx) {
        let effective = chaosMode ? (idx+2)%4 : idx;
        let action = actions[effective];
        if(glitchMode && (action==='МЯУ'||action==='ТИХО'))
            action = action==='МЯУ' ? 'ТИХО' : 'МЯУ';
        return action;
    }
    function generateCommand() {
        if(!gameRunning) return;
        const isFake = Math.random()<0.22;
        let cmdAction = actions[Math.floor(Math.random()*4)];
        if(isFake) currentCommand = { text:`НЕ ${cmdAction}`, action:cmdAction, isFake:true };
        else currentCommand = { text:cmdAction, action:cmdAction, isFake:false };
        commandEndTime = Date.now()+1700;
        let baseDelay = 1500;
        if(gameMode==='levels') baseDelay = Math.max(800, 1600-currentLevel*22);
        else {
            if(endlessDifficulty==='easy') baseDelay=1450;
            else if(endlessDifficulty==='normal') baseDelay=1150;
            else baseDelay=850;
        }
        setTimeout(()=>{ if(gameRunning && !currentCommand) generateCommand(); }, baseDelay);
    }
    function handleAnswer(sectorIdx) {
        if(!gameRunning || !currentCommand) return;
        if(Date.now()>commandEndTime) {
            showWarning('⏰ Слишком поздно!'); combo=0; updateMultiplier();
            generateCommand(); return;
        }
        const selected = getActionForSector(sectorIdx);
        const correct = currentCommand.isFake ? selected !== currentCommand.action : selected === currentCommand.action;
        if(correct) {
            let earn = 10*scoreMultiplier;
            score+=earn; combo++;
            if(combo>5) combo=5;
            updateMultiplier();
            addParticles(catX,catY,'#ffd700',7);
            playCorrect();
            flashAlpha=0.65; screenShake=3;
            showWarning(`✅ +${earn}! Комбо x${scoreMultiplier}`);
            generateCommand();
        } else {
            combo=0; updateMultiplier();
            score = Math.max(0, score-5);
            playWrong();
            screenShake=7;
            addParticles(catX,catY,'#ff4444',12);
            showWarning(`❌ Ошибка! Нужно: ${currentCommand.isFake ? `НЕ ${currentCommand.action}` : currentCommand.action}`);
            generateCommand();
        }
        updateUI();
    }
    function startGlitch() { if(gameRunning){ glitchMode=true; showWarning('🌀 ГЛЮК-РЕЖИМ: МЯУ ↔ ТИХО'); setTimeout(()=>glitchMode=false,5000); } }
    function startChaos() { if(gameRunning){ chaosMode=true; showWarning('🌪️ ХАОС-РЕЖИМ: Сектора сдвинуты!'); setTimeout(()=>chaosMode=false,6000); } }
    function startInverted() { if(gameRunning){ invertedMode=true; showWarning('🌈 ИНВЕРСИЯ: Цвета перевёрнуты'); setTimeout(()=>invertedMode=false,4000); } }
    function randomEffect() { if(!gameRunning) return; const r=Math.random(); if(r<0.07) startGlitch(); else if(r<0.12) startChaos(); else if(r<0.16) startInverted(); }
    function startTimers() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(()=>{
            if(!gameRunning) return;
            if(gameMode==='levels') {
                levelTimeLeft -= 0.1;
                if(levelTimeLeft<=0) { levelTimeLeft=0; levelComplete(); }
            } else {
                timeLeft -= 0.1;
                if(timeLeft<=0) { timeLeft=0; gameOver(); }
            }
            updateUI();
        },100);
        setInterval(()=>randomEffect(),13000);
    }
    function levelComplete() {
        if(!gameRunning) return;
        gameRunning=false; playLevelUp();
        if(currentLevel<30) {
            showLevelPopup(`🎉 УРОВЕНЬ ${currentLevel} ПРОЙДЕН! 🎉`, ()=>{ currentLevel++; resetLevel(); });
        } else {
            showLevelPopup(`🏆 ПОБЕДА! ВСЕ 30 УРОВНЕЙ! Счёт: ${score} 🏆`, ()=>exitToMenu());
        }
    }
    function gameOver() {
        if(!gameRunning) return;
        gameRunning=false; playGameOver();
        showLevelPopup(`💀 ИГРА ОКОНЧЕНА! Счёт: ${score} 💀`, ()=>exitToMenu());
    }
    function showLevelPopup(msg, callback) {
        const popup = document.createElement('div');
        popup.className = 'level-complete';
        popup.innerHTML = `<h2>${msg}</h2><button class="menu-btn primary" style="margin-top:16px; padding:10px 24px;">ПРОДОЛЖИТЬ</button>`;
        document.body.appendChild(popup);
        popup.querySelector('button').onclick = ()=>{ popup.remove(); callback(); };
    }
    function resetLevel() {
        score=0; combo=0; updateMultiplier();
        levelTimeLeft = Math.max(28, 48-currentLevel);
        gameRunning=true;
        glitchMode=chaosMode=invertedMode=false;
        generateCommand();
        updateUI();
        screenShake=0;
    }
    
    // Отрисовка
    function draw() {
        if(!ctx) return;
        if(invertedMode) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0,0,w,h);
            ctx.globalCompositeOperation = 'difference';
        } else {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0,0,w,h);
        }
        
        let sx=0,sy=0;
        if(screenShake>0){
            sx=(Math.random()-0.5)*screenShake;
            sy=(Math.random()-0.5)*screenShake;
            screenShake*=0.85;
            ctx.save();
            ctx.translate(sx,sy);
        }
        
        for(let i=0;i<4;i++){
            let startRad = (sectorAngles[i]-45)*Math.PI/180;
            let endRad = (sectorAngles[i]+45)*Math.PI/180;
            ctx.beginPath();
            ctx.moveTo(centerX,centerY);
            ctx.arc(centerX,centerY,radius,startRad,endRad);
            ctx.closePath();
            let hue = sectorAngles[i];
            ctx.fillStyle = invertedMode ? `hsl(${hue}, 80%, 60%)` : `hsl(${hue}, 80%, 45%)`;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            let midRad = sectorAngles[i]*Math.PI/180;
            let textRad = radius*0.68;
            let textX = centerX + Math.cos(midRad)*textRad;
            let textY = centerY + Math.sin(midRad)*textRad;
            let action = getActionForSector(i);
            let idx = actions.indexOf(action);
            let emoji = actionEmoji[idx] || '🐱';
            
            ctx.font = 'bold 34px "Segoe UI Emoji"';
            ctx.fillStyle = invertedMode ? '#ffffff' : '#ffffff';
            ctx.shadowBlur = 4;
            ctx.fillText(emoji, textX-20, textY-12);
            ctx.font = 'bold 19px "Segoe UI"';
            ctx.fillStyle = invertedMode ? '#ffffff' : '#f0f0f0';
            ctx.fillText(action, textX-22, textY+18);
            ctx.shadowBlur = 0;
        }
        
        ctx.beginPath();
        ctx.arc(centerX,centerY,52,0,Math.PI*2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.save();
        let catAngle = Math.atan2(catY-centerY, catX-centerX);
        ctx.translate(catX,catY);
        ctx.rotate(catAngle + Math.PI/2);
        if(catImageLoaded) ctx.drawImage(catImage, -28, -28, 56, 56);
        else {
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.ellipse(0,0,22,26,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath(); ctx.arc(-9,-9,3.5,0,Math.PI*2); ctx.arc(9,-9,3.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(-8,-10,1.8,0,Math.PI*2); ctx.arc(10,-10,1.8,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff8888';
            ctx.beginPath(); ctx.ellipse(0,5,7,4,0,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
        
        if(currentCommand && gameRunning){
            let percent = Math.max(0, (commandEndTime-Date.now())/1700);
            ctx.beginPath();
            ctx.arc(centerX, centerY-75, 35, 0, Math.PI*2*percent);
            ctx.strokeStyle = '#ff5555';
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.font = 'bold 26px "Segoe UI"';
            ctx.fillStyle = invertedMode ? '#ffffff' : '#ffffff';
            let displayText = currentCommand.text;
            if(currentCommand.isFake) ctx.fillStyle = '#ffaa77';
            ctx.fillText(displayText, centerX-70, centerY-90);
            ctx.fillStyle = '#44ff66';
            ctx.fillRect(centerX-100, centerY-118, 200*percent, 6);
        }
        
        for(let p of particles) p.draw(ctx);
        particles = particles.filter(p=>p.update());
        
        if(flashAlpha>0){
            ctx.fillStyle = `rgba(255,255,200,${flashAlpha})`;
            ctx.fillRect(0,0,w,h);
            flashAlpha *= 0.88;
        }
        if(glitchMode && Math.random()<0.25){
            ctx.fillStyle = `rgba(255,0,255,${Math.random()*0.25})`;
            ctx.fillRect(0,0,w,h);
        }
        if(screenShake>0) ctx.restore();
        if(invertedMode) ctx.globalCompositeOperation = 'source-over';
        
        if(!gameRunning){
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0,0,w,h);
            ctx.font = 'bold 32px "Segoe UI"';
            ctx.fillStyle = '#ffd700';
            ctx.fillText('GAME OVER', centerX-105, centerY);
        }
    }
    
    function animate() { if(gameRunning) updateCatRunning(); draw(); requestAnimationFrame(animate); }
    animate();
    
    function initGame(mode, diff=null) {
        gameMode = mode;
        endlessDifficulty = diff || 'normal';
        currentLevel = 1;
        score = 0; combo = 0; updateMultiplier();
        catRunTime = 0;
        if(gameMode==='levels') { levelTimeLeft = 46; timeLeft = 60; }
        else { 
            if(endlessDifficulty==='easy') timeLeft = 95;
            else if(endlessDifficulty==='normal') timeLeft = 75;
            else timeLeft = 55;
        }
        gameRunning = true;
        glitchMode=chaosMode=invertedMode=false;
        generateCommand();
        updateUI();
        startTimers();
        document.getElementById('gameContainer').style.display = 'block';
        document.getElementById('menuOverlay').style.display = 'none';
        document.getElementById('difficultyMenu').style.display = 'none';
        canvas.onclick = (e)=>{
            if(!gameRunning) return;
            let rect=canvas.getBoundingClientRect(), scale=canvas.width/rect.width;
            let x=(e.clientX-rect.left)*scale, y=(e.clientY-rect.top)*scale;
            let sec=getSectorFromClick(x,y);
            if(sec!==-1) handleAnswer(sec);
        };
        canvas.ontouchstart = (e)=>{
            e.preventDefault();
            let t=e.touches[0];
            let rect=canvas.getBoundingClientRect(), scale=canvas.width/rect.width;
            let x=(t.clientX-rect.left)*scale, y=(t.clientY-rect.top)*scale;
            let sec=getSectorFromClick(x,y);
            if(sec!==-1) handleAnswer(sec);
        };
    }
    function startLevelMode() { initGame('levels'); }
    function startEndlessMode() { initGame('endless', endlessDifficulty); }
    function showDifficultyMenu() {
        document.getElementById('menuOverlay').style.display = 'none';
        document.getElementById('difficultyMenu').style.display = 'flex';
    }
    function backToMain() {
        if(timerInterval) clearInterval(timerInterval);
        gameRunning = false;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('menuOverlay').style.display = 'flex';
        document.getElementById('difficultyMenu').style.display = 'none';
    }
    function setDifficulty(d) {
        endlessDifficulty = d;
        document.querySelectorAll('.difficulty-btn').forEach(btn=>btn.classList.remove('active'));
        document.querySelector(`.difficulty-btn[data-diff="${d}"]`).classList.add('active');
    }
    window.toggleSound=toggleSound;
    window.startLevelMode=startLevelMode;
    window.startEndlessMode=startEndlessMode;
    window.showDifficultyMenu=showDifficultyMenu;
    window.backToMain=backToMain;
    window.setDifficulty=setDifficulty;
    window.exitToMenu=exitToMenu;
</script>
</body>
</html>
