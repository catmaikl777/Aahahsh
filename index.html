<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мяу-мания: Гипно-кот</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            padding: 16px;
        }
        
        .game-container {
            background: linear-gradient(145deg, #0f0f1a, #080811);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 36px;
            cursor: pointer;
            touch-action: none;
            width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        
        /* Меню */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s ease;
        }
        
        .menu-panel {
            background: linear-gradient(145deg, #1a1a2a, #0c0c18);
            border-radius: 72px;
            padding: 36px 44px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            max-width: 90%;
            width: 420px;
        }
        
        .menu-panel h1 {
            font-size: 3.2rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ff5500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(255,140,0,0.3);
        }
        
        .menu-panel .sub {
            color: #aaa;
            margin-bottom: 32px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        
        .menu-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 14px 28px;
            margin: 8px 0;
            width: 100%;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        
        .menu-btn.primary {
            background: linear-gradient(135deg, #ff8c00, #ff5500);
            box-shadow: 0 6px 20px rgba(255,85,0,0.35);
            border: none;
        }
        
        .menu-btn.secondary {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .menu-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        
        .menu-btn:active {
            transform: scale(0.98);
        }
        
        .difficulty-row {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        
        .difficulty-btn {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 8px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 0.85rem;
        }
        
        .difficulty-btn.active {
            background: linear-gradient(135deg, #ff8c00, #ff5500);
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(255,85,0,0.3);
        }
        
        .back-btn {
            background: rgba(255,255,255,0.04);
            margin-top: 16px;
        }
        
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.55);
            border-radius: 60px;
            margin-bottom: 18px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .info-box {
            background: rgba(0,0,0,0.65);
            padding: 6px 18px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }
        
        .info-box span {
            color: #ffd700;
            margin-right: 6px;
            font-size: 1.1rem;
        }
        
        .sound-toggle, .exit-btn {
            background: rgba(0,0,0,0.55);
            border: none;
            border-radius: 50px;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        
        .exit-btn {
            background: rgba(255,50,50,0.3);
            border: 1px solid rgba(255,80,80,0.3);
        }
        
        .exit-btn:hover {
            background: rgba(255,50,50,0.5);
        }
        
        .right-buttons {
            display: flex;
            gap: 8px;
        }
        
        .warning {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            animation: slideDown 0.3s ease;
            z-index: 150;
            pointer-events: none;
            white-space: nowrap;
            font-size: 0.9rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-25px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .level-complete {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #2a2a3e, #1a1a2e);
            padding: 32px 48px;
            border-radius: 64px;
            text-align: center;
            z-index: 180;
            animation: popIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 2px solid #ffd700;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        
        .level-complete h2 {
            margin: 0 0 20px 0;
            color: #ffd700;
        }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        @media (max-width: 550px) {
            .menu-panel { padding: 28px 24px; }
            .menu-panel h1 { font-size: 2.4rem; }
            .info-box { padding: 4px 12px; font-size: 0.7rem; }
            .info-box span { font-size: 0.9rem; }
            .sound-toggle, .exit-btn { padding: 4px 12px; font-size: 0.8rem; }
            .warning { top: 70px; font-size: 0.75rem; white-space: normal; text-align: center; max-width: 85%; }
        }
    </style>
</head>
<body>
<div id="menuOverlay" class="menu-overlay">
    <div class="menu-panel">
        <h1>😺 МЯУ-МАНИЯ</h1>
        <div class="sub">ГИПНО-КОТ | РИТМ-РЕАКЦИЯ</div>
        <button class="menu-btn primary" onclick="startLevelMode()">🐾 УРОВНИ (30 уровней)</button>
        <button class="menu-btn secondary" onclick="showDifficultyMenu()">🌀 БЕСКОНЕЧНЫЙ РЕЖИМ</button>
        <div style="margin-top: 20px;">
            <button class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔊 ЗВУК ВКЛ</button>
        </div>
    </div>
</div>

<div id="difficultyMenu" style="display:none;" class="menu-overlay">
    <div class="menu-panel">
        <h2>🎮 БЕСКОНЕЧНЫЙ РЕЖИМ</h2>
        <div class="difficulty-row">
            <div class="difficulty-btn" data-diff="easy" onclick="setDifficulty('easy')">🍃 ЛЁГКИЙ</div>
            <div class="difficulty-btn active" data-diff="normal" onclick="setDifficulty('normal')">⚡ СРЕДНИЙ</div>
            <div class="difficulty-btn" data-diff="hard" onclick="setDifficulty('hard')">🔥 СЛОЖНЫЙ</div>
        </div>
        <button class="menu-btn primary" onclick="startEndlessMode()">НАЧАТЬ ИГРУ</button>
        <button class="menu-btn back-btn" onclick="backToMain()">◀ ГЛАВНОЕ МЕНЮ</button>
    </div>
</div>

<div class="game-container" id="gameContainer" style="display:none;">
    <div class="info-panel">
        <div class="info-box"><span>🎯</span> <span id="scoreValue">0</span></div>
        <div class="info-box"><span>🔥</span> <span id="comboValue">0</span></div>
        <div class="info-box" id="modeInfo"><span>📊</span> <span id="levelInfo">Уровень 1/30</span></div>
        <div class="right-buttons">
            <button class="exit-btn" onclick="exitToMenu()">🚪 ВЫХОД</button>
            <button class="sound-toggle" onclick="toggleSound()" id="soundBtnGame">🔊</button>
        </div>
    </div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
</div>

<script>
    // ========== КАНВАС ==========
    const canvas = document.getElementById('gameCanvas');
    let ctx = canvas ? canvas.getContext('2d') : null;
    let w = 500, h = 500;
    if(canvas) { canvas.width = w; canvas.height = h; }
    
    // ========== ЗВУКИ ==========
    let soundEnabled = true;
    let audioCtx = null;
    
    function initAudio() {
        if(!audioCtx && soundEnabled) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    
    function playBeep(freq, duration, type='sine', vol=0.2) {
        if(!soundEnabled) return;
        try {
            initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.value = vol;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    
    function playCorrect() { playBeep(880, 0.12, 'sine', 0.15); }
    function playWrong() { playBeep(340, 0.25, 'sawtooth', 0.2); }
    function playLevelUp() { playBeep(660, 0.08); setTimeout(()=>playBeep(880,0.15),100); setTimeout(()=>playBeep(1040,0.2),250); }
    function playGameOver() { playBeep(260, 0.5); setTimeout(()=>playBeep(180,0.8),350); }
    
    function toggleSound() {
        soundEnabled = !soundEnabled;
        const btns = document.querySelectorAll('.sound-toggle');
        btns.forEach(btn => btn.innerHTML = soundEnabled ? '🔊' : '🔇');
        if(soundEnabled && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function exitToMenu() {
        if(timerInterval) clearInterval(timerInterval);
        gameRunning = false;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('menuOverlay').style.display = 'flex';
        document.getElementById('difficultyMenu').style.display = 'none';
    }
    
    // ========== ПАРТИКЛЫ ==========
    let particles = [];
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 7;
            this.vy = (Math.random() - 0.5) * 7 - 3;
            this.life = 0.9;
            this.color = color;
            this.size = 5 + Math.random() * 5;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.25;
            this.life -= 0.025;
            return this.life > 0;
        }
        draw(ctx) {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size/1.5, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    
    function addParticles(x, y, color, count=10) {
        for(let i=0;i<count;i++) particles.push(new Particle(x, y, color));
    }
    
    // ========== ИГРОВОЕ СОСТОЯНИЕ ==========
    let gameRunning = true;
    let gameMode = 'levels';
    let currentLevel = 1;
    let endlessDifficulty = 'normal';
    let score = 0;
    let combo = 0;
    let scoreMultiplier = 1;
    let timeLeft = 60;
    let levelTimeLeft = 45;
    
    let glitchMode = false;
    let chaosMode = false;
    let invertedMode = false;
    let warningMessage = '';
    
    const actions = ['МЯУ', 'ТИХО', 'БЕЙ', 'ПРЯТКИ'];
    const actionEmoji = ['😺', '🤫', '👊', '📦'];
    let sectorAngles = [0, 90, 180, 270];
    const centerX = w/2, centerY = h/2, radius = 165;
    
    let currentCommand = null;
    let commandEndTime = 0;
    let nextCommandDelay = 1200;
    let flashAlpha = 0;
    let screenShake = 0;
    let gameLoopId = null;
    let timerInterval = null;
    
    function updateMultiplier() {
        if(combo === 0) scoreMultiplier = 1;
        else if(combo === 1) scoreMultiplier = 1;
        else if(combo === 2) scoreMultiplier = 2;
        else if(combo === 3) scoreMultiplier = 3;
        else if(combo === 4) scoreMultiplier = 4;
        else scoreMultiplier = 5;
    }
    
    function updateUI() {
        const scoreSpan = document.getElementById('scoreValue');
        const comboSpan = document.getElementById('comboValue');
        if(scoreSpan) scoreSpan.innerText = score;
        if(comboSpan) comboSpan.innerText = combo;
        const levelSpan = document.getElementById('levelInfo');
        if(levelSpan) {
            if(gameMode === 'levels') levelSpan.innerText = `Уровень ${currentLevel}/30`;
            else levelSpan.innerText = `Бесконечный [${endlessDifficulty === 'easy' ? 'Лёгкий' : endlessDifficulty === 'normal' ? 'Средний' : 'Сложный'}]`;
        }
        const timeSpan = document.getElementById('timeValue');
        if(timeSpan) timeSpan.innerText = Math.ceil(gameMode === 'levels' ? levelTimeLeft : timeLeft);
    }
    
    function showWarning(msg) {
        warningMessage = msg;
        const div = document.createElement('div');
        div.className = 'warning';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(()=>div.remove(), 1100);
    }
    
    function getSectorFromClick(mx, my) {
        const dx = mx - centerX, dy = my - centerY;
        if(Math.hypot(dx, dy) > radius + 20) return -1;
        let angle = Math.atan2(dy, dx) * 180 / Math.PI;
        if(angle < 0) angle += 360;
        for(let i=0;i<sectorAngles.length;i++) {
            let start = sectorAngles[i] - 45, end = sectorAngles[i] + 45;
            if(start<0) start+=360; if(end>=360) end-=360;
            if(start<=end) { if(angle>=start && angle<=end) return i; }
            else { if(angle>=start || angle<=end) return i; }
        }
        return -1;
    }
    
    function getActionForSector(idx) {
        let effective = chaosMode ? (idx+2)%4 : idx;
        let action = actions[effective];
        if(glitchMode && (action === 'МЯУ' || action === 'ТИХО'))
            action = action === 'МЯУ' ? 'ТИХО' : 'МЯУ';
        return action;
    }
    
    function generateCommand() {
        if(!gameRunning) return;
        const isFake = Math.random() < 0.22;
        let cmdAction = actions[Math.floor(Math.random()*4)];
        if(isFake) currentCommand = { text: `НЕ ${cmdAction}`, action: cmdAction, isFake: true };
        else currentCommand = { text: cmdAction, action: cmdAction, isFake: false };
        commandEndTime = Date.now() + 1700;
        
        let baseDelay = 1500;
        if(gameMode === 'levels') baseDelay = Math.max(800, 1600 - currentLevel * 22);
        else {
            if(endlessDifficulty === 'easy') baseDelay = 1450;
            else if(endlessDifficulty === 'normal') baseDelay = 1150;
            else baseDelay = 850;
        }
        nextCommandDelay = baseDelay;
        setTimeout(()=>{ if(gameRunning && !currentCommand) generateCommand(); }, nextCommandDelay);
    }
    
    function handleAnswer(sectorIdx) {
        if(!gameRunning || !currentCommand) return;
        if(Date.now() > commandEndTime) {
            showWarning('⏰ Слишком поздно!'); combo=0; updateMultiplier();
            generateCommand(); return;
        }
        const selected = getActionForSector(sectorIdx);
        let correct = currentCommand.isFake ? selected !== currentCommand.action : selected === currentCommand.action;
        
        if(correct) {
            let earn = 10 * scoreMultiplier;
            score += earn;
            combo++;
            if(combo>5) combo=5;
            updateMultiplier();
            addParticles(centerX + (Math.random()-0.5)*80, centerY + (Math.random()-0.5)*80, '#ffd700', 7);
            playCorrect();
            flashAlpha = 0.65;
            screenShake = 3;
            showWarning(`✅ +${earn}! Комбо x${scoreMultiplier}`);
            generateCommand();
        } else {
            combo=0;
            updateMultiplier();
            score = Math.max(0, score-5);
            playWrong();
            screenShake = 7;
            addParticles(centerX, centerY, '#ff4444', 12);
            showWarning(`❌ Ошибка! Нужно: ${currentCommand.isFake ? `НЕ ${currentCommand.action}` : currentCommand.action}`);
            generateCommand();
        }
        updateUI();
    }
    
    function startGlitch() { if(gameRunning){ glitchMode=true; showWarning('🌀 ГЛЮК-РЕЖИМ: МЯУ ↔ ТИХО'); setTimeout(()=>glitchMode=false,5000); } }
    function startChaos() { if(gameRunning){ chaosMode=true; showWarning('🌪️ ХАОС-РЕЖИМ: Сектора сдвинуты!'); setTimeout(()=>chaosMode=false,6000); } }
    function startInverted() { if(gameRunning){ invertedMode=true; showWarning('🌈 ИНВЕРСИЯ: Цвета перевёрнуты'); setTimeout(()=>invertedMode=false,4000); } }
    
    function randomEffect() {
        if(!gameRunning) return;
        const r=Math.random();
        if(r<0.07) startGlitch();
        else if(r<0.12) startChaos();
        else if(r<0.16) startInverted();
    }
    
    function startTimers() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(()=>{
            if(!gameRunning) return;
            if(gameMode === 'levels') {
                levelTimeLeft -= 0.1;
                if(levelTimeLeft <= 0) { levelTimeLeft=0; levelComplete(); }
            } else {
                timeLeft -= 0.1;
                if(timeLeft <= 0) { timeLeft=0; gameOver(); }
            }
            updateUI();
        }, 100);
        
        setInterval(()=> randomEffect(), 13000);
    }
    
    function levelComplete() {
        if(!gameRunning) return;
        gameRunning = false;
        playLevelUp();
        if(currentLevel < 30) {
            showLevelPopup(`🎉 УРОВЕНЬ ${currentLevel} ПРОЙДЕН! 🎉`, ()=>{
                currentLevel++;
                resetLevel();
            });
        } else {
            showLevelPopup(`🏆 ПОБЕДА! ВСЕ 30 УРОВНЕЙ! Счёт: ${score} 🏆`, ()=>{
                exitToMenu();
            });
        }
    }
    
    function gameOver() {
        if(!gameRunning) return;
        gameRunning = false;
        playGameOver();
        showLevelPopup(`💀 ИГРА ОКОНЧЕНА! Счёт: ${score} 💀`, ()=>{
            exitToMenu();
        });
    }
    
    function showLevelPopup(msg, callback) {
        const popup = document.createElement('div');
        popup.className = 'level-complete';
        popup.innerHTML = `<h2>${msg}</h2><button class="menu-btn primary" style="margin-top:16px; padding:10px 24px;">ПРОДОЛЖИТЬ</button>`;
        document.body.appendChild(popup);
        popup.querySelector('button').onclick = ()=>{
            popup.remove();
            callback();
        };
    }
    
    function resetLevel() {
        score = 0; combo = 0; updateMultiplier();
        levelTimeLeft = Math.max(28, 48 - currentLevel);
        gameRunning = true;
        glitchMode=chaosMode=invertedMode=false;
        generateCommand();
        updateUI();
        screenShake=0;
    }
    
    // ========== ОТРИСОВКА (ИСПРАВЛЕННАЯ) ==========
    function draw() {
        if(!ctx) return;
        
        // Инверсия
        if(invertedMode) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'difference';
        } else {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, w, h);
        }
        
        // Тряска
        let sx=0, sy=0;
        if(screenShake>0){
            sx=(Math.random()-0.5)*screenShake;
            sy=(Math.random()-0.5)*screenShake;
            screenShake*=0.85;
            ctx.save();
            ctx.translate(sx,sy);
        }
        
        // Рисуем 4 сектора
        for(let i=0;i<4;i++){
            let startAngleRad = (sectorAngles[i] - 45) * Math.PI / 180;
            let endAngleRad = (sectorAngles[i] + 45) * Math.PI / 180;
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngleRad, endAngleRad);
            ctx.closePath();
            
            let hue = sectorAngles[i];
            ctx.fillStyle = invertedMode ? `hsl(${hue}, 75%, 55%)` : `hsl(${hue}, 75%, 40%)`;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            // Рисуем текст действия и эмодзи — теперь строго по центру сектора
            let midAngle = sectorAngles[i] * Math.PI / 180;
            let textRadius = radius * 0.65;
            let textX = centerX + Math.cos(midAngle) * textRadius;
            let textY = centerY + Math.sin(midAngle) * textRadius;
            
            let action = getActionForSector(i);
            let actionIndex = actions.indexOf(action);
            let emoji = actionEmoji[actionIndex] || '🐱';
            
            ctx.font = 'bold 34px "Segoe UI Emoji", "Apple Color Emoji", system-ui';
            ctx.fillStyle = invertedMode ? '#000000' : '#ffffff';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.fillText(emoji, textX - 20, textY - 12);
            
            ctx.font = 'bold 19px "Segoe UI", system-ui';
            ctx.fillStyle = invertedMode ? '#000000' : '#f0f0f0';
            ctx.fillText(action, textX - 22, textY + 18);
            ctx.shadowBlur = 0;
        }
        
        // Центральный круг с котом
        ctx.beginPath();
        ctx.arc(centerX, centerY, 52, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        ctx.font = '42px "Segoe UI Emoji"';
        ctx.fillStyle = '#000000';
        ctx.fillText('🐱', centerX - 25, centerY + 15);
        
        // Текущая команда
        if(currentCommand && gameRunning){
            let percent = Math.max(0, (commandEndTime - Date.now()) / 1700);
            ctx.beginPath();
            ctx.arc(centerX, centerY - 80, 38, 0, Math.PI * 2 * percent);
            ctx.strokeStyle = '#ff5555';
            ctx.lineWidth = 5;
            ctx.stroke();
            
            ctx.font = 'bold 26px "Segoe UI", system-ui';
            ctx.fillStyle = invertedMode ? '#000000' : '#ffffff';
            let displayText = currentCommand.text;
            if(currentCommand.isFake) {
                ctx.fillStyle = '#ffaa77';
            }
            ctx.shadowBlur = 3;
            ctx.fillText(displayText, centerX - 70, centerY - 90);
            ctx.shadowBlur = 0;
            
            // Дополнительный прогресс-бар
            ctx.fillStyle = '#44ff66';
            ctx.fillRect(centerX - 100, centerY - 118, 200 * percent, 6);
        }
        
        // Партиклы
        for(let p of particles) p.draw(ctx);
        particles = particles.filter(p=>p.update());
        
        // Вспышка
        if(flashAlpha > 0){
            ctx.fillStyle = `rgba(255,255,200,${flashAlpha})`;
            ctx.fillRect(0, 0, w, h);
            flashAlpha *= 0.88;
        }
        
        // Глюк-эффект
        if(glitchMode && Math.random()<0.25){
            ctx.fillStyle = `rgba(255,0,255,${Math.random()*0.25})`;
            ctx.fillRect(0, 0, w, h);
        }
        
        if(screenShake>0) ctx.restore();
        if(invertedMode) ctx.globalCompositeOperation = 'source-over';
        
        // Затемнение при окончании
        if(!gameRunning){
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, w, h);
            ctx.font = 'bold 32px "Segoe UI"';
            ctx.fillStyle = '#ffd700';
            ctx.fillText('GAME OVER', centerX-105, centerY);
        }
    }
    
    function animate() { 
        draw(); 
        requestAnimationFrame(animate); 
    }
    
    function initGame(mode, diff=null) {
        gameMode = mode;
        endlessDifficulty = diff || 'normal';
        currentLevel = 1;
        score = 0; combo = 0; updateMultiplier();
        if(gameMode === 'levels') { levelTimeLeft = 46; timeLeft = 60; }
        else { 
            if(endlessDifficulty === 'easy') timeLeft = 95;
            else if(endlessDifficulty === 'normal') timeLeft = 75;
            else timeLeft = 55;
        }
        gameRunning = true;
        glitchMode=chaosMode=invertedMode=false;
        generateCommand();
        updateUI();
        startTimers();
        document.getElementById('gameContainer').style.display = 'block';
        document.getElementById('menuOverlay').style.display = 'none';
        document.getElementById('difficultyMenu').style.display = 'none';
        if(canvas){
            canvas.onclick = (e)=>{
                if(!gameRunning) return;
                let rect=canvas.getBoundingClientRect(), scale=canvas.width/rect.width;
                let x=(e.clientX-rect.left)*scale, y=(e.clientY-rect.top)*scale;
                let sec=getSectorFromClick(x,y);
                if(sec!==-1) handleAnswer(sec);
            };
            canvas.ontouchstart = (e)=>{ 
                e.preventDefault(); 
                let t=e.touches[0]; 
                let rect=canvas.getBoundingClientRect(), scale=canvas.width/rect.width;
                let x=(t.clientX-rect.left)*scale, y=(t.clientY-rect.top)*scale;
                let sec=getSectorFromClick(x,y); 
                if(sec!==-1) handleAnswer(sec);
            };
        }
    }
    
    function startLevelMode() { initGame('levels'); }
    function startEndlessMode() { initGame('endless', endlessDifficulty); }
    function showDifficultyMenu() {
        document.getElementById('menuOverlay').style.display = 'none';
        document.getElementById('difficultyMenu').style.display = 'flex';
    }
    function backToMain() {
        if(timerInterval) clearInterval(timerInterval);
        gameRunning = false;
        document.getElementById('gameContainer').style.display = 'none';
        document.getElementById('menuOverlay').style.display = 'flex';
        document.getElementById('difficultyMenu').style.display = 'none';
    }
    function setDifficulty(d) {
        endlessDifficulty = d;
        document.querySelectorAll('.difficulty-btn').forEach(btn=>btn.classList.remove('active'));
        document.querySelector(`.difficulty-btn[data-diff="${d}"]`).classList.add('active');
    }
    
    if(ctx) animate();
    window.toggleSound=toggleSound;
    window.startLevelMode=startLevelMode;
    window.startEndlessMode=startEndlessMode;
    window.showDifficultyMenu=showDifficultyMenu;
    window.backToMain=backToMain;
    window.setDifficulty=setDifficulty;
    window.exitToMenu=exitToMenu;
</script>
</body>
</html>
